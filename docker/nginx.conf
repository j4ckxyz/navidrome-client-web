server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip for text assets.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Hashed build assets are immutable and can be cached aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA history fallback: every unknown route serves index.html so client-side
    # routing works on refresh/deep-link.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html itself must never be cached, or clients get stale bundles.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
