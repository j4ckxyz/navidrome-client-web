# All-in-one stack: Navidrome + this web client, sharing one music folder.
#
# This is the simplest way to get every feature, including in-browser uploads.
# Both services mount the same music directory, and the web client proxies to
# Navidrome over the internal network (no CORS, nothing exposed but the web UI).
#
#   1. Edit MUSIC_HOST_DIR (or the ./music default) to your music library.
#   2. docker compose -f docker-compose.full.yml up -d
#   3. Open http://localhost:8680 and create your admin account on first login.
#
# Admins get an upload button in the sidebar; dropped files/folders/ZIPs are
# written into the shared library and a Navidrome scan runs automatically.

services:
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    environment:
      ND_LOGLEVEL: info
      ND_SCANSCHEDULE: 1h
    volumes:
      - ${MUSIC_HOST_DIR:-./music}:/music
      - ./nd-data:/data
    restart: unless-stopped

  navidrome-web:
    build:
      context: .
      args:
        - COMMIT_HASH
    image: navidrome-client-web:latest
    container_name: navidrome-web
    depends_on:
      - navidrome
    ports:
      - "8680:8080"
    environment:
      NAVIDROME_URL: http://navidrome:4533
      MUSIC_DIR: /music
    volumes:
      - ${MUSIC_HOST_DIR:-./music}:/music
    restart: unless-stopped
